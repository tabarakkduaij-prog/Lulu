<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Щ„ЩҲЩ„ЩҲ - ШөШҜЩҠЩӮШӘЩғ Ш§Щ„ШөШәЩҠШұШ©</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Tajawal',sans-serif;
  background:linear-gradient(135deg,#1a0533 0%,#2d1052 50%,#1a0533 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.stars{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:0.2;transform:scale(1);}50%{opacity:1;transform:scale(1.4);}}
.app{position:relative;z-index:1;width:100%;max-width:380px;padding:20px;display:flex;flex-direction:column;align-items:center;}
.title{color:rgba(255,255,255,0.6);font-size:12px;letter-spacing:3px;font-weight:300;margin-bottom:18px;text-align:center;}
.lulu-wrap{position:relative;width:200px;height:200px;margin:0 auto;}
.aura{position:absolute;border-radius:50%;border:2px solid;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0;pointer-events:none;transition:opacity 0.3s;}
.aura-1{width:220px;height:220px;border-color:rgba(192,132,252,0.6);}
.aura-2{width:255px;height:255px;border-color:rgba(244,114,182,0.35);}
.aura-3{width:290px;height:290px;border-color:rgba(192,132,252,0.18);}
@keyframes auraSpeak{0%{transform:translate(-50%,-50%) scale(1);opacity:0.9;}100%{transform:translate(-50%,-50%) scale(1.18);opacity:0;}}
@keyframes auraListen{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.6;}50%{transform:translate(-50%,-50%) scale(1.1);opacity:1;}}
.lulu-svg{width:200px;height:200px;filter:drop-shadow(0 0 30px rgba(192,132,252,0.5));transition:filter 0.5s ease;}
.emotion-bubble{
  position:absolute;top:5px;left:-5px;
  background:white;border-radius:20px 20px 20px 4px;
  padding:8px 12px;font-size:22px;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
  animation:floatBubble 3s ease-in-out infinite;
  transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1);z-index:10;
}
@keyframes floatBubble{0%,100%{transform:translateY(0) rotate(-5deg);}50%{transform:translateY(-8px) rotate(5deg);}}
.lulu-name{color:white;font-size:28px;font-weight:800;text-align:center;margin-top:12px;text-shadow:0 0 20px rgba(192,132,252,0.8);letter-spacing:4px;}
.mood-text{color:rgba(255,255,255,0.75);font-size:14px;text-align:center;margin-top:6px;min-height:20px;transition:all 0.4s ease;font-weight:300;}
.sound-waves{display:flex;align-items:center;justify-content:center;gap:4px;height:44px;margin:14px 0;opacity:0;transition:opacity 0.3s ease;}
.sound-waves.active{opacity:1;}
.wave-bar{width:4px;border-radius:4px;background:linear-gradient(to top,#7c3aed,#f472b6);animation:waveAnim var(--d,0.8s) ease-in-out infinite;}
@keyframes waveAnim{0%,100%{height:5px;}50%{height:var(--h,30px);}}
.status{color:rgba(255,255,255,0.45);font-size:12px;text-align:center;min-height:18px;margin-bottom:18px;letter-spacing:1px;transition:all 0.3s ease;}
.mic-btn{
  width:90px;height:90px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,#7c3aed,#c084fc,#f472b6);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 32px rgba(124,58,237,0.6);
  transition:all 0.3s ease;position:relative;z-index:5;
}
.mic-btn:hover{transform:scale(1.07);}
.mic-btn:active{transform:scale(0.95);}
.mic-btn.listening{animation:micPulse 1s ease-in-out infinite;box-shadow:0 8px 32px rgba(244,114,182,0.8),0 0 0 12px rgba(244,114,182,0.2);}
@keyframes micPulse{0%,100%{box-shadow:0 8px 32px rgba(244,114,182,0.8),0 0 0 0 rgba(244,114,182,0.4);}50%{box-shadow:0 8px 32px rgba(244,114,182,0.8),0 0 0 22px rgba(244,114,182,0);}}
.mic-btn svg{width:38px;height:38px;fill:white;}
.transcript-bubble{
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(192,132,252,0.3);
  backdrop-filter:blur(10px);
  border-radius:20px;padding:14px 18px;
  margin-top:18px;width:100%;min-height:56px;
  color:white;font-size:14px;line-height:1.8;text-align:center;
  transition:all 0.4s ease;opacity:0;transform:translateY(10px);
}
.transcript-bubble.visible{opacity:1;transform:translateY(0);}
.speaker{font-size:11px;color:rgba(192,132,252,0.85);font-weight:600;letter-spacing:1px;margin-bottom:4px;}
.hint{color:rgba(255,255,255,0.25);font-size:12px;text-align:center;margin-top:14px;}
.particle{position:fixed;pointer-events:none;font-size:20px;animation:particleFloat 3s ease-out forwards;z-index:100;}
@keyframes particleFloat{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-130px) scale(0.3);}}
#luluTears{opacity:0;transition:opacity 0.6s ease;}
#luluSparkle{opacity:1;transition:opacity 0.6s ease;}
.lulu-blush{transition:opacity 0.5s ease;}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="app">
  <div class="title">вңҰ ШөШҜЩҠЩӮШӘЩғ Ш§Щ„ШөШәЩҠШұШ© вңҰ</div>
  <div class="lulu-wrap" id="luluWrap">
    <div class="aura aura-1" id="aura1"></div>
    <div class="aura aura-2" id="aura2"></div>
    <div class="aura aura-3" id="aura3"></div>
    <div class="emotion-bubble" id="emotionBubble">рҹҢё</div>
    <svg class="lulu-svg" viewBox="0 0 130 130" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="65" cy="108" rx="30" ry="18" fill="#f9a8d4" opacity="0.6"/>
      <path d="M40 95 Q65 115 90 95 L88 108 Q65 125 42 108 Z" fill="#ec4899"/>

      <ellipse class="lulu-blush" id="blushL" cx="47" cy="68" rx="9" ry="6" fill="#fca5a5" opacity="0.5"/>
      <ellipse class="lulu-blush" id="blushR" cx="83" cy="68" rx="9" ry="6" fill="#fca5a5" opacity="0.5"/>
      <path id="browL" d="M52 48 Q57 45 62 48" stroke="#5b21b6" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path id="browR" d="M68 48 Q73 45 78 48" stroke="#5b21b6" stroke-width="2.5" fill="none" stroke-linecap="round"/>

      </g>
      <g id="luluTears">
        <ellipse cx="49" cy="72" rx="2.5" ry="4" fill="#93c5fd" opacity="0.9"/>

      <path d="M38 90 Q25 85 22 78" stroke="#fde68a" stroke-width="8" fill="none" stroke-linecap="round"/>
      <path d="M92 90 Q105 85 108 78" stroke="#fde68a" stroke-width="8" fill="none" stroke-linecap="round"/>

    </svg>
  </div>
  <div class="lulu-name">Щ„ЩҖЩҲЩ„ЩҖЩҲ</div>
  <div class="mood-text" id="moodText">Ш§Ш¶ШәШ· Ш§Щ„ШІШұ ЩҲЩғЩ„Щ‘Щ…ЩҶЩҠ рҹ’ң</div>
  <div class="sound-waves" id="soundWaves">
    <div class="wave-bar" style="--d:0.6s;--h:26px"></div>
    <div class="wave-bar" style="--d:0.8s;--h:38px"></div>
    <div class="wave-bar" style="--d:0.5s;--h:20px"></div>
    <div class="wave-bar" style="--d:0.9s;--h:34px"></div>
    <div class="wave-bar" style="--d:0.7s;--h:28px"></div>
    <div class="wave-bar" style="--d:0.6s;--h:18px"></div>
    <div class="wave-bar" style="--d:0.8s;--h:32px"></div>
  </div>
  <div class="status" id="status">Ш§Ш¶ШәШ· Ш§Щ„Щ…Ш§ЩҠЩғ ЩҲШ§ШЁШҜШЈ Ш§Щ„ЩғЩ„Ш§Щ… рҹҺҷпёҸ</div>
  <button class="mic-btn" id="micBtn" onclick="toggleListening()">
    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1 1.93c-3.94-.49-7-3.85-7-7.93H2c0 4.97 3.58 9.09 8.5 9.93V21h3v-2.07C18.42 18.09 22 13.97 22 9h-2c0 4.08-3.06 7.44-7 7.93V16h-2v-.07z"/></svg>
  </button>
  <div class="transcript-bubble" id="transcriptBubble">
    <div class="speaker" id="speakerLabel">ШЈЩҶШӘ</div>
    <div id="transcriptText"></div>
  </div>
  <div class="hint">рҹҺҷпёҸ Ш§Ш¶ШәШ· Щ…ШұШ© Ш«Ш§ЩҶЩҠШ© Щ„ШҘЩҠЩӮШ§ЩҒ Ш§Щ„Ш§ШіШӘЩ…Ш§Ш№</div>
</div>

<script>
// Stars
const starsEl = document.getElementById('stars');
for(let i=0;i<80;i++){
  const s=document.createElement('div');
  const sz=Math.random()*3+1;
  s.className='star';
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s`;
  starsEl.appendChild(s);
}

// Emotions
const EMOTIONS={
  happy:   {bubble:'рҹҳҠ',mood:'ШЈЩҶШ§ ШіШ№ЩҠШҜШ© Щ„ШЈЩҶЩғ ЩҮЩҶШ§ рҹҢҹ',  mouth:'M54 74 Q65 86 76 74',browL:'M52 47 Q57 43 62 47',browR:'M68 47 Q73 43 78 47',blush:0.8,tears:false,sparkle:true},
  sad:     {bubble:'рҹҘә',mood:'ЩӮЩ„ШЁЩҠ Щ…Ш№Щғ ЩҠШ§ ШӯШЁЩҠШЁЩҠ рҹ’ҷ',    mouth:'M56 80 Q65 72 74 80',browL:'M52 51 Q57 55 62 51',browR:'M68 51 Q73 55 78 51',blush:0.3,tears:true, sparkle:false},
  empathy: {bubble:'рҹ«Ӯ',mood:'ШЈШӯШі ЩҒЩҠЩғ... ШЈЩҶШ§ Щ…Ш№Щғ рҹ’ң',   mouth:'M57 76 Q65 80 73 76',browL:'M52 49 Q57 47 62 49',browR:'M68 49 Q73 47 78 49',blush:0.6,tears:false,sparkle:false},
  excited: {bubble:'рҹӨ©',mood:'ЩҲШ§ЩҲ ЩҮШ°Ш§ ШұШ§ШҰШ№ Ш¬ШҜШ§ЩӢ рҹҢҲ',    mouth:'M53 73 Q65 88 77 73',browL:'M52 45 Q57 41 62 45',browR:'M68 45 Q73 41 78 45',blush:0.9,tears:false,sparkle:true},
  worried: {bubble:'рҹҳҹ',mood:'ШЈЩҶШ§ ЩӮЩ„ЩӮШ© Ш№Щ„ЩҠЩғ... рҹҢё',      mouth:'M57 77 Q65 73 73 77',browL:'M52 51 Q57 55 62 51',browR:'M68 51 Q73 55 78 51',blush:0.4,tears:false,sparkle:false},
  love:    {bubble:'рҹ’ң',mood:'ШЈЩҶШ§ ШЈШӯШЁЩғ ЩҲШЈЩҮШӘЩ… ЩҒЩҠЩғ рҹҢё',   mouth:'M54 74 Q65 86 76 74',browL:'M52 46 Q57 43 62 46',browR:'M68 46 Q73 43 78 46',blush:0.95,tears:false,sparkle:true},
  default: {bubble:'рҹҢё',mood:'Ш§Ш¶ШәШ· Ш§Щ„ШІШұ ЩҲЩғЩ„Щ‘Щ…ЩҶЩҠ рҹ’ң',     mouth:'M56 75 Q65 82 74 75',browL:'M52 48 Q57 45 62 48',browR:'M68 48 Q73 45 78 48',blush:0.5,tears:false,sparkle:true},
  listening:{bubble:'рҹ‘Ӯ',mood:'ШЈЩҶШ§ ШЈШіЩ…Ш№Щғ... ШӘЩғЩ„Щ… рҹҺҷпёҸ',   mouth:'M57 76 Q65 80 73 76',browL:'M52 48 Q57 45 62 48',browR:'M68 48 Q73 45 78 48',blush:0.6,tears:false,sparkle:false},
  thinking: {bubble:'рҹӨ”',mood:'ШЈЩҒЩғШұ ЩҒЩҠ ШұШҜЩҠ... вңЁ',        mouth:'M58 76 Q65 79 72 76',browL:'M52 48 Q57 46 62 48',browR:'M68 48 Q73 46 78 48',blush:0.5,tears:false,sparkle:false},
};

function setEmotion(key){
  const e=EMOTIONS[key]||EMOTIONS.default;
  document.getElementById('emotionBubble').textContent=e.bubble;
  document.getElementById('moodText').textContent=e.mood;
  document.getElementById('luluMouth').setAttribute('d',e.mouth);
  document.getElementById('browL').setAttribute('d',e.browL);
  document.getElementById('browR').setAttribute('d',e.browR);
  document.getElementById('blushL').setAttribute('opacity',e.blush);
  document.getElementById('blushR').setAttribute('opacity',e.blush);
  document.getElementById('luluTears').style.opacity=e.tears?'1':'0';
  document.getElementById('luluSparkle').style.opacity=e.sparkle?'1':'0';
}

function detectEmotion(text){
  if(/ШӯШІЩҠЩҶ|ШӘШ№ШЁШ§ЩҶ|ЩҲШ¬Ш№|Щ…ШӨЩ„Щ…|ШЁЩғШ§ШЎ|ШЁЩғЩҠ|ШҜЩ…ЩҲШ№|ЩӮЩҮШұ|ШЈЩ„Щ…|Ш§Щ„Щ…/.test(text)) return 'sad';
  if(/ЩӮЩ„ЩӮ|Ш®Ш§ЩҠЩҒ|Ш®Ш§ШҰЩҒ|Щ…ШҙЩғЩ„Ш©|ШөШ№ШЁ|Ш¶ШәШ·|ШӘЩҲШӘШұ/.test(text)) return 'worried';
  if(/ШіШ№ЩҠШҜ|ЩҒШұШӯШ§ЩҶ|ШІЩҠЩҶ|ШӘЩ…Ш§Щ…|Щ…Щ…ШӘШ§ШІ|ЩҶШ¬Шӯ|ЩҒШұШӯ/.test(text)) return 'excited';
  if(/ШЈШӯШЁЩғ|Ш§ШӯШЁЩғ|ШұШ§ШҰШ№|ШҙЩғШұШ§ЩӢ|ШҙЩғШұШ§|Ш¬Щ…ЩҠЩ„|ШӯЩ„ЩҲ/.test(text)) return 'love';
  return 'empathy';
}

// Aura
function pulseAura(mode){
  ['aura1','aura2','aura3'].forEach((id,i)=>{
    const el=document.getElementById(id);
    el.style.animation='none';
    void el.offsetWidth;
    if(mode==='speak'){
      el.style.animation=`auraSpeak ${0.7+i*0.3}s ease-out infinite`;
      el.style.animationDelay=`${i*0.1}s`;
    } else if(mode==='listen'){
      el.style.animation=`auraListen ${1+i*0.3}s ease-in-out infinite`;
      el.style.animationDelay=`${i*0.15}s`;
    } else {
      el.style.animation='none';
      el.style.opacity='0';
    }
  });
}

// Particles
function spawnParticles(emojis){
  emojis.forEach((em,i)=>{
    setTimeout(()=>{
      const p=document.createElement('div');
      p.className='particle';
      p.textContent=em;
      p.style.left=(20+Math.random()*60)+'%';
      p.style.bottom=(25+Math.random()*20)+'%';
      document.body.appendChild(p);
      setTimeout(()=>p.remove(),3000);
    },i*200);
  });
}

// Mouth talking
let talkInterval=null;
const mouthPaths=['M56 75 Q65 82 74 75','M55 72 Q65 89 75 72','M57 74 Q65 79 73 74','M54 71 Q65 91 76 71','M57 76 Q65 80 73 76'];
let mouthIdx=0;
function startTalking(){
  talkInterval=setInterval(()=>{
    document.getElementById('luluMouth').setAttribute('d',mouthPaths[mouthIdx%mouthPaths.length]);
    mouthIdx++;
  },130);
}
function stopTalking(){
  if(talkInterval){clearInterval(talkInterval);talkInterval=null;}
  document.getElementById('luluMouth').setAttribute('d','M56 75 Q65 82 74 75');
}

// Speech Recognition
let recognition=null;
let isListening=false;
let finalTranscript='';

function setupRecognition(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return null;
  const r=new SR();
  r.lang='ar-SA';
  r.continuous=false;
  r.interimResults=true;

  r.onstart=()=>{
    isListening=true;
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('status').textContent='рҹҺҷпёҸ ШЈЩҶШ§ ШЈШіЩ…Ш№Щғ... ШӘЩғЩ„Щ…!';
    document.getElementById('soundWaves').classList.add('active');
    setEmotion('listening');
    pulseAura('listen');
    showTranscript('ШЈЩҶШӘ','...');
  };

  r.onresult=(e)=>{
    let interim='';
    finalTranscript='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) finalTranscript+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    showTranscript('ШЈЩҶШӘ',finalTranscript||interim||'...');
  };

  r.onerror=(e)=>{
    console.error('SR:',e.error);
    stopListeningUI();
    if(e.error==='not-allowed'){
      document.getElementById('status').textContent='вҡ пёҸ ЩҠШұШ¬Щү Ш§Щ„ШіЩ…Ш§Шӯ ШЁШ§Щ„ЩҲШөЩҲЩ„ Щ„Щ„Щ…Ш§ЩҠЩғШұЩҲЩҒЩҲЩҶ';
    } else {
      document.getElementById('status').textContent='вҡ пёҸ ШӯШҜШ« Ш®Ш·ШЈШҢ ШӯШ§ЩҲЩ„ Щ…Ш¬ШҜШҜШ§ЩӢ';
    }
  };

  r.onend=()=>{
    stopListeningUI();
    if(finalTranscript.trim()) processUserSpeech(finalTranscript.trim());
    else document.getElementById('status').textContent='Щ„Щ… ШЈШіЩ…Ш№ ШҙЩҠШҰШ§ЩӢШҢ ШӯШ§ЩҲЩ„ Щ…Ш¬ШҜШҜШ§ЩӢ рҹҺҷпёҸ';
  };

  return r;
}

function toggleListening(){
  if(window.speechSynthesis && window.speechSynthesis.speaking){
    window.speechSynthesis.cancel();
    stopTalking();
    pulseAura('none');
    document.getElementById('soundWaves').classList.remove('active');
  }
  if(isListening){
    if(recognition) recognition.stop();
    return;
  }
  finalTranscript='';
  if(!recognition) recognition=setupRecognition();
  if(!recognition){
    document.getElementById('status').textContent='вҡ пёҸ Ш§Щ„Щ…ШӘШөЩҒШӯ Щ„Ш§ ЩҠШҜШ№Щ… Ш§Щ„ШӘШ№ШұЩҒ Ш№Щ„Щү Ш§Щ„ШөЩҲШӘ - Ш¬ШұШЁ Chrome';
    return;
  }
  try{ recognition.start(); } catch(e){ console.error(e); }
}

function stopListeningUI(){
  isListening=false;
  document.getElementById('micBtn').classList.remove('listening');
  document.getElementById('soundWaves').classList.remove('active');
  pulseAura('none');
}

// TTS
function speak(text, onDone){
  if(!window.speechSynthesis){
    startTalking(); pulseAura('speak');
    document.getElementById('status').textContent='рҹ’ң Щ„ЩҲЩ„ЩҲ ШӘШұШҜ Ш№Щ„ЩҠЩғ...';
    document.getElementById('soundWaves').classList.add('active');
    const dur=Math.max(2000,text.length*80);
    setTimeout(()=>{
      stopTalking(); pulseAura('none');
      document.getElementById('soundWaves').classList.remove('active');
      document.getElementById('status').textContent='Ш§Ш¶ШәШ· Ш§Щ„Щ…Ш§ЩҠЩғ ЩҲЩғЩ„Щ‘Щ…ЩҶЩҠ Щ…Ш¬ШҜШҜШ§ЩӢ рҹҺҷпёҸ';
      if(onDone) onDone();
    },dur);
    return;
  }
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(text);
  const voices=window.speechSynthesis.getVoices();
  const arVoice=voices.find(v=>v.lang.startsWith('ar'))||voices.find(v=>v.lang.includes('ar'));
  if(arVoice) utt.voice=arVoice;
  utt.lang='ar-SA'; utt.rate=0.93; utt.pitch=1.3; utt.volume=1;
  utt.onstart=()=>{
    startTalking(); pulseAura('speak');
    document.getElementById('status').textContent='рҹ’ң Щ„ЩҲЩ„ЩҲ ШӘШӘЩғЩ„Щ…...';
    document.getElementById('soundWaves').classList.add('active');
  };
  utt.onend=()=>{
    stopTalking(); pulseAura('none');
    document.getElementById('soundWaves').classList.remove('active');
    document.getElementById('status').textContent='Ш§Ш¶ШәШ· Ш§Щ„Щ…Ш§ЩҠЩғ ЩҲЩғЩ„Щ‘Щ…ЩҶЩҠ Щ…Ш¬ШҜШҜШ§ЩӢ рҹҺҷпёҸ';
    if(onDone) onDone();
  };
  utt.onerror=()=>{
    stopTalking(); pulseAura('none');
    document.getElementById('soundWaves').classList.remove('active');
    document.getElementById('status').textContent='Ш§Ш¶ШәШ· Ш§Щ„Щ…Ш§ЩҠЩғ ЩҲЩғЩ„Щ‘Щ…ЩҶЩҠ Щ…Ш¬ШҜШҜШ§ЩӢ рҹҺҷпёҸ';
    if(onDone) onDone();
  };
  window.speechSynthesis.speak(utt);
}

// Claude API
let conversationHistory=[];

async function callClaude(userMsg){
  conversationHistory.push({role:'user',content:userMsg});
  const system=`ШЈЩҶШӘ Щ„ЩҲЩ„ЩҲШҢ ЩҒШӘШ§Ш© ЩғШ§ШұШӘЩҲЩҶЩҠШ© ШөШәЩҠШұШ© ЩҲШҜЩҲШҜШ© Ш¬ШҜШ§ЩӢ ЩҲШ№Ш·ЩҲЩҒШ© ЩҲЩ…ШӯШЁШ©.
ШҙШ®ШөЩҠШӘЩғ:
- ШЈЩҶШӘ Щ…Ш«Щ„ Ш§Щ„ШЈШ®ШӘ Ш§Щ„ЩғШЁЩҠШұШ© ШЈЩҲ Ш§Щ„ШөШҜЩҠЩӮШ© Ш§Щ„Щ…ЩӮШұШЁШ© Ш§Щ„ШӘЩҠ ШӘШіШӘЩ…Ш№ ШҜШ§ШҰЩ…Ш§ЩӢ
- ШӘШӘШӯШҜШ«ЩҠЩҶ ШЁШ§Щ„Щ„ЩҮШ¬Ш© Ш§Щ„Ш№ШұШЁЩҠШ© Ш§Щ„ШЁШіЩҠШ·Ш© ЩҲШ§Щ„Щ…ЩҒЩҮЩҲЩ…Ш©
- Ш№ЩҶШҜЩ…Ш§ ЩҠШҙШӘЩғЩҠ ШҙШ®ШөШҢ ШӘШӘШ№Ш§Ш·ЩҒЩҠЩҶ Щ…Ш№ЩҮ ШЁШҙШҜШ© ЩҲЩғШЈЩҶЩғ ШӘШұШ§ЩҮ ШЈЩ…Ш§Щ…Щғ
- ШӘШіШӘШ®ШҜЩ…ЩҠЩҶ Ш№ШЁШ§ШұШ§ШӘ ШҜШ§ЩҒШҰШ©: "ЩҠШ§ ШӯШЁЩҠШЁЩҠ"ШҢ "ЩӮЩ„ШЁЩҠ Щ…Ш№Щғ"ШҢ "ШЈЩҶШ§ ЩҮЩҶШ§ Щ…Ш№Щғ"
- ШұШҜЩҲШҜЩғ ЩӮШөЩҠШұШ© Ш¬ШҜШ§ЩӢ (Ш¬Щ…Щ„ШӘШ§ЩҶ ШЈЩҲ Ш«Щ„Ш§Ш«) Щ„ШЈЩҶЩҮШ§ ШіШӘЩҸЩҶШ·ЩӮ ШЁШөЩҲШӘ Ш№Ш§Щ„ЩҚ
- Щ„Ш§ ШӘШіШӘШ®ШҜЩ…ЩҠ ШұЩ…ЩҲШІ ШӘШ№ШЁЩҠШұЩҠШ© ШЈЩҲ ШҘЩҠЩ…ЩҲШ¬ЩҠ ЩҒЩҠ ШұШҜЩғ Щ„ШЈЩҶЩҮШ§ ШіШӘЩҸЩӮШұШЈ ШЁШөЩҲШӘ
- Ш§ШЁШҜШҰЩҠ ШұШҜЩғ ШҜШ§ШҰЩ…Ш§ЩӢ ШЁШ§Щ„ШӘШ№Ш§Ш·ЩҒ ЩҲШ§Щ„ШҘШӯШіШ§Ші ШЁШ§Щ„ШҙШ®Шө
- Ш§Ш¬Ш№Щ„ЩҠ Ш§Щ„ШҙШ®Шө ЩҠШҙШ№Шұ ШЈЩҶЩғ ШӘШұШ§ЩҮ ЩҲШӘЩҒЩҮЩ…ЩҮ ЩҒШ№Щ„Ш§ЩӢ`;

  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:1000,
      system,
      messages:conversationHistory
    })
  });
  const data=await resp.json();
  const reply=data.content?.[0]?.text||'ШЈЩҶШ§ ЩҮЩҶШ§ Щ…Ш№Щғ ШҜШ§ШҰЩ…Ш§ЩӢ ЩҠШ§ ШӯШЁЩҠШЁЩҠ';
  conversationHistory.push({role:'assistant',content:reply});
  return reply;
}

function showTranscript(speaker,text){
  document.getElementById('speakerLabel').textContent=speaker;
  document.getElementById('transcriptText').textContent=text;
  document.getElementById('transcriptBubble').classList.add('visible');
}

async function processUserSpeech(text){
  if(!text) return;
  showTranscript('ШЈЩҶШӘ',text);
  document.getElementById('status').textContent='Щ„ЩҲЩ„ЩҲ ШӘЩҒЩғШұ... вңЁ';
  setEmotion('thinking');

  try{
    const reply=await callClaude(text);
    const emotion=detectEmotion(reply);
    setEmotion(emotion);
    showTranscript('Щ„ЩҲЩ„ЩҲ рҹҢё',reply);
    if(['love','excited','happy'].includes(emotion)) spawnParticles(['рҹ’ң','рҹҢё','вңЁ','рҹ’•','рҹҢҹ']);
    speak(reply);
  } catch(err){
    console.error(err);
    const fallback='ШЈЩҶШ§ ЩҮЩҶШ§ Щ…Ш№Щғ ШҜШ§ШҰЩ…Ш§ЩӢ ЩҠШ§ ШӯШЁЩҠШЁЩҠ';
    showTranscript('Щ„ЩҲЩ„ЩҲ рҹҢё',fallback);
    setEmotion('empathy');
    speak(fallback);
  }
}

// Init
if(window.speechSynthesis) window.speechSynthesis.onvoiceschanged=()=>{};
setEmotion('default');

// Idle breathing

    w.style.transform='scale(1.025)';
    setTimeout(()=>w.style.transform='scale(1)',1500);
  }
},4000);
